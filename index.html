<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏯 Three Kingdoms Arena</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h1>🏯 천하통일</h1>
        <h2>Three Kingdoms Arena</h2>
        <p class="version">Version v0.1 Alpha</p>
    </header>

    <main>

        <section id="mainMenu">

            <button id="startBtn" class="menuBtn">
                🎮 게임 시작
            </button>

            <button class="menuBtn" disabled>
                📖 장수도감 (준비중)
            </button>

            <button class="menuBtn" disabled>
                ⚙️ 설정 (준비중)
            </button>

        </section>

        <section id="gameArea">

            <h2>환영합니다!</h2>

            <p>
                삼국지 장수들을 모아
                천하를 통일하세요.
            </p>

            <div id="messageBox">

                게임 시작 버튼을 눌러
                첫 번째 장수들을 만나보세요.

            </div>

        </section>

    </main>

    <footer>

        © 2026 Three Kingdoms Arena

    </footer>

    <script src="js/generals.js"></script>
    <script src="js/game.js"></script>

</body>
</html>
